    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002
    ports:
      - 8096:8096
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/jellyfin/config:/config
      - ${DOCKERCONFDIR}/jellyfin/cache:/cache
      - ${DOCKERSTORAGEDIR}/media:/data/media:ro #read-only


################################## Plex - Media server ###################################
# Plex - https://hotio.dev/containers/plex/
# mkdir -p /volume1/docker/arr-data/plex
# Also please read the extra info => 
# https://trash-guides.info/Hardlinks/How-to-setup-for/Synology/#appdata
###########################################################################################
  plex:
    container_name: plex
    image: ghcr.io/hotio/plex
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    labels:
      - org.hotio.pullio.update=${PULLIO_UPDATE}
      - org.hotio.pullio.notify=${PULLIO_NOTIFY}
      - org.hotio.pullio.discord.webhook=${PULLIO_DISCORD_WEBHOOK}
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002
      - PLEX_CLAIM_TOKEN=${PLEX_CLAIM_TOKEN}
      - PLEX_ADVERTISE_URL=${PLEX_ADVERTISE_URL}
      - PLEX_NO_AUTH_NETWORKS=
      - PLEX_BETA_INSTALL=${PLEX_BETA_INSTALL}
    ports:
      - 32400:32400
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/plex:/config:rw
      - ${DOCKERSTORAGEDIR}/media:/data/media:rw


################################## GoAccess - Visuallize logs ##############################
# GoAccess - Visuallize logs
# mkdir -p /volume1/docker/arr-data/goaccess/logs
############################################################################################
  goaccess:
    container_name: goaccess
    image: justsky/goaccess-for-nginxproxymanager:latest
    restart: unless-stopped   
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    labels:
      - org.hotio.pullio.update=${PULLIO_UPDATE}
      - org.hotio.pullio.notify=${PULLIO_NOTIFY}
      - org.hotio.pullio.discord.webhook=${PULLIO_DISCORD_WEBHOOK}
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002
      #- SKIP_ARCHIVED_LOGS=False #optional   
      #- BASIC_AUTH=False #optional
      #- BASIC_AUTH_USERNAME=user #optional
      #- BASIC_AUTH_PASSWORD=pass #optional                
    ports:
      - 7880:7880
    volumes:
      - /etc/localtime:/etc/localtime:ro
      #- ./data/npm_data/logs:/opt/log
      - ${DOCKERCONFDIR}/goaccess/logs:/opt/log
        # - ./data/npm_data/logs/proxy-host-1_access.log:/opt/log/proxy-host-1_access.log

        
