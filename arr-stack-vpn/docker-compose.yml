version: "3.2"
services:
#-------------------------------------------------------------|
# Services     | Open ports                                   |
#-------------------------------------------------------------|
# Radarr       |  7878:7878    |             |                |
# Sonarr       |  8989:8989    |             |                |
# Bazarr       |  6767:6767    |             |                |
# Lidarr       |  8686:8686    |             |                |
# Whisparr     |  6969:6969    |             |                |
# Prowlarr     |  9696:9696    |             |                |
# Qbittorrent  |  8080:8080    |  6881:6881  | 6881:6881/udp  |
# flaresolverr |  8191:8191    |             |                |
# Gluetun      |               |             |                |
# Jellyfin     |  9096:8096    |             |                |
# Plex         |  32500:32400  |             |                |
# GoAccess     |  7880:7880    |             |                |
#--------------------------------------------------------------

################################ Radarr - Movies #####################################
# Radarr - https://hotio.dev/containers/radarr/
# mkdir /volume1/docker/arr-data/radarr
######################################################################################
  radarr:
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: ${DOCKERLOGGING_MAXFILE}
        max-size: ${DOCKERLOGGING_MAXSIZE}
    labels:
      - org.hotio.pullio.update=${PULLIO_UPDATE}
      - org.hotio.pullio.notify=${PULLIO_NOTIFY}
      - org.hotio.pullio.discord.webhook=${PULLIO_DISCORD_WEBHOOK}
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=002
    env_file:
      - .env
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
    network_mode: "service:gluetun"  # Routes all traffic through Gluetun
    depends_on:
      - gluetun
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKERCONFDIR}/radarr:/config
      - ${DOCKERSTORAGEDIR}:/volume1/data


